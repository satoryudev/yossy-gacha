<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ヨッシー ガチャ入荷ウォッチ</title>
<style>
  :root {
    --bg: #0f1419;
    --card: #1a2029;
    --line: #2a3340;
    --text: #e7edf3;
    --muted: #8b97a6;
    --accent: #4ade80;
    --accent-2: #38bdf8;
    --warn: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 680px; margin: 0 auto; padding: 0 16px 64px; }
  header {
    background: radial-gradient(120% 140% at 0% 0%, #1f3a2e 0%, #122031 55%, #0f1419 100%);
    border-bottom: 1px solid var(--line);
    padding: 28px 16px 24px;
  }
  .header-inner { max-width: 680px; margin: 0 auto; }
  h1 { font-size: 1.45rem; letter-spacing: .02em; display: flex; align-items: center; gap: 10px; }
  h1 .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  .sub { color: var(--muted); font-size: .9rem; margin-top: 6px; }
  .sub a { color: var(--accent-2); text-decoration: none; }
  .sub a:hover { text-decoration: underline; }

  .status {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin: 18px 0 8px;
  }
  .chip {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 999px; padding: 6px 13px; font-size: .82rem; color: var(--muted);
  }
  .chip b { color: var(--text); font-weight: 600; }
  .chip.live b { color: var(--accent); }

  .keywords { margin: 10px 0 22px; font-size: .85rem; color: var(--muted); }
  .kw { display:inline-block; background:#14202b; border:1px solid var(--line); color:var(--accent-2); border-radius:6px; padding:1px 8px; margin:0 4px 4px 0; }

  .card {
    background: var(--card); border: 1px solid var(--line); border-left: 3px solid var(--accent);
    border-radius: 12px; padding: 16px 16px 14px; margin-bottom: 14px;
  }
  .card .date { color: var(--muted); font-size: .8rem; margin-bottom: 8px; }
  .card .body { white-space: pre-wrap; word-break: break-word; font-size: .96rem; }
  .card a.open {
    display: inline-block; margin-top: 12px; font-size: .85rem; font-weight: 600;
    color: #0f1419; background: var(--accent); padding: 7px 14px; border-radius: 8px; text-decoration: none;
  }
  .card a.open:hover { filter: brightness(1.08); }

  .empty {
    text-align: center; padding: 56px 20px; color: var(--muted);
    background: var(--card); border: 1px dashed var(--line); border-radius: 14px; margin-top: 8px;
  }
  .empty .big { font-size: 2.4rem; margin-bottom: 12px; }
  .empty p { margin: 4px 0; }

  footer { text-align: center; color: var(--muted); font-size: .78rem; margin-top: 36px; }
  footer a { color: var(--accent-2); text-decoration: none; }
  .err { color: var(--warn); }
</style>
</head>
<body>
  <header>
    <div class="header-inner">
      <h1><span class="dot"></span>ヨッシー ガチャ入荷ウォッチ</h1>
      <p class="sub">監視店舗：#C-pla 津田沼ビート店 <a href="https://x.com/Cplaviit" target="_blank" rel="noopener">@Cplaviit</a></p>
    </div>
  </header>

  <main class="wrap">
    <div class="status" id="status">
      <span class="chip">読み込み中…</span>
    </div>
    <div class="keywords" id="keywords"></div>
    <div id="list"></div>
    <footer>
      10分おきに自動チェック（営業時間中）／ データは
      <a href="https://github.com/satoryudev/yossy-gacha" target="_blank" rel="noopener">GitHub</a> で公開
    </footer>
  </main>

<script>
const bust = "?_=" + Date.now();
const jst = (s) => {
  if (!s) return "—";
  try {
    return new Date(s).toLocaleString("ja-JP", {
      timeZone: "Asia/Tokyo", month: "numeric", day: "numeric",
      hour: "2-digit", minute: "2-digit",
    });
  } catch { return s; }
};
const ago = (iso) => {
  if (!iso) return "";
  const sec = (Date.now() - new Date(iso).getTime()) / 1000;
  if (sec < 90) return "たった今";
  if (sec < 3600) return Math.floor(sec / 60) + "分前";
  if (sec < 86400) return Math.floor(sec / 3600) + "時間前";
  return Math.floor(sec / 86400) + "日前";
};

async function getJson(path, fallback) {
  try {
    const r = await fetch(path + bust, { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    return await r.json();
  } catch { return fallback; }
}

(async () => {
  const [status, matches] = await Promise.all([
    getJson("./data/status.json", null),
    getJson("./data/matches.json", []),
  ]);

  const statusEl = document.getElementById("status");
  if (status) {
    statusEl.innerHTML = `
      <span class="chip live">状況 <b>${matches.length ? "入荷情報あり" : "監視中"}</b></span>
      <span class="chip">最終チェック <b>${ago(status.lastChecked)}</b>（${jst(status.lastChecked)}）</span>
      <span class="chip">直近取得 <b>${status.fetched ?? "—"}</b>件</span>`;
    document.getElementById("keywords").innerHTML =
      "監視キーワード：" + (status.keywords || []).map((k) => `<span class="kw">${k}</span>`).join("");
  } else {
    statusEl.innerHTML = `<span class="chip err">状況データを読み込めませんでした</span>`;
  }

  const list = document.getElementById("list");
  if (!matches.length) {
    list.innerHTML = `
      <div class="empty">
        <div class="big">🥚</div>
        <p>まだヨッシーの入荷情報はありません。</p>
        <p>入荷ポストを検知すると、ここに自動で表示されます。</p>
      </div>`;
    return;
  }
  list.innerHTML = matches.map((m) => `
    <article class="card">
      <div class="date">🕒 ${jst(m.pubDate)}</div>
      <div class="body">${(m.title || "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]))}</div>
      <a class="open" href="${m.link}" target="_blank" rel="noopener">Xで見る →</a>
    </article>`).join("");
})();
</script>
</body>
</html>
