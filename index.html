<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ヨッシー ガチャ入荷ウォッチ｜津田沼</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg1:#e7f8ee; --bg2:#fef7e7;
    --ink:#243a2c; --muted:#7b8d80; --card:#ffffff; --line:#e7efe5;
    --yoshi:#37b24d; --yoshi-d:#2b9440; --sun:#ffd43b; --orange:#ff922b;
    --sky:#4dabf7; --shadow:0 10px 24px -12px rgba(33,84,48,.35);
    --disp:"Mochiy Pop One", "Zen Maru Gothic", system-ui, sans-serif;
    --body:"Zen Maru Gothic", "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--body); color: var(--ink); line-height: 1.7; -webkit-font-smoothing: antialiased;
    background:
      radial-gradient(rgba(255,255,255,.6) 1.4px, transparent 1.5px) 0 0 / 20px 20px,
      linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%) fixed;
    min-height: 100vh;
  }
  /* ふわっと浮かぶカプセルの装飾 */
  body::before {
    content:""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background:
      radial-gradient(circle at 88% 8%, rgba(255,212,59,.30), transparent 22%),
      radial-gradient(circle at 6% 30%, rgba(77,171,247,.22), transparent 20%),
      radial-gradient(circle at 95% 78%, rgba(55,178,77,.20), transparent 22%);
    filter: blur(8px);
  }

  .wrap { max-width: 660px; margin: 0 auto; padding: 0 16px 72px; }

  header {
    background: linear-gradient(155deg, #4ad06a 0%, #37b24d 55%, #2b9440 100%);
    border-radius: 0 0 30px 30px; padding: 30px 18px 26px; position: relative; overflow: hidden;
    box-shadow: 0 14px 30px -16px rgba(43,148,64,.7);
  }
  header::after { /* つやハイライト */
    content:""; position:absolute; top:-60%; left:-10%; width:70%; height:160%;
    background: radial-gradient(closest-side, rgba(255,255,255,.35), transparent); transform: rotate(18deg);
  }
  .header-inner { max-width: 660px; margin: 0 auto; position: relative; z-index: 1; }
  h1 {
    font-family: var(--disp); font-size: 1.7rem; line-height: 1.3; color: #fff;
    display: flex; align-items: center; gap: 12px; text-shadow: 0 2px 0 rgba(0,0,0,.12);
  }
  .egg { /* たまご型カプセルのアイコン */
    flex: none; width: 30px; height: 36px; border-radius: 50% 50% 48% 48% / 60% 60% 40% 40%;
    background: linear-gradient(160deg,#fff 0 55%, #d8f3df 55% 100%);
    box-shadow: inset 0 -3px 0 rgba(43,148,64,.2), 0 3px 8px rgba(0,0,0,.18);
    position: relative; animation: bob 3s ease-in-out infinite;
  }
  .egg::before { content:""; position:absolute; left:6px; top:6px; width:9px; height:6px; border-radius:50%; background:rgba(255,255,255,.9); transform: rotate(-20deg); }
  @keyframes bob { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-4px) rotate(3deg)} }
  .live { display:inline-block; width:9px;height:9px;border-radius:50%;background:#eaffef;box-shadow:0 0 0 3px rgba(255,255,255,.35); animation:pulse 1.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
  .sub { color: #eafff0; font-size: .9rem; margin-top: 8px; font-weight: 500; opacity:.95; }

  .status { display: flex; flex-wrap: wrap; gap: 8px; margin: 20px 0 8px; }
  .chip { background: var(--card); border: 1px solid var(--line); border-radius: 999px; padding: 6px 13px; font-size: .8rem; color: var(--muted); box-shadow: 0 2px 6px -3px rgba(33,84,48,.25); }
  .chip b { color: var(--ink); font-weight: 700; }
  .chip.alive b { color: var(--yoshi-d); }
  .keywords { margin: 8px 2px 18px; font-size: .82rem; color: var(--muted); }
  .kw { display:inline-block; background:#eafaef; color:var(--yoshi-d); border-radius:7px; padding:2px 9px; margin:0 5px 5px 0; font-weight:700; }

  /* セグメント型タブ */
  .tabs { display: flex; background: #ffffff; border: 1px solid var(--line); border-radius: 999px; padding: 5px; gap: 5px; margin-bottom: 18px; box-shadow: var(--shadow); }
  .tab {
    flex: 1; text-align: center; padding: 11px 6px; border-radius: 999px; cursor: pointer;
    color: var(--muted); font-size: .92rem; font-weight: 700; user-select: none; transition: all .22s ease;
  }
  .tab.active { color: #fff; background: linear-gradient(160deg,#4ad06a,#2b9440); box-shadow: 0 6px 14px -6px rgba(43,148,64,.8); }
  .tab .badge { display:inline-block; min-width:20px; padding:0 6px; margin-left:7px; border-radius:999px; background:var(--sun); color:#5b4500; font-size:.72rem; font-weight:800; }
  .tab.active .badge { background:#fff; color:var(--yoshi-d); }

  .feedfilter { display:flex; align-items:center; gap:9px; margin:-6px 4px 16px; font-size:.86rem; color:var(--muted); cursor:pointer; user-select:none; font-weight:500; }
  .feedfilter input { width:17px; height:17px; accent-color:var(--yoshi); }

  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 20px;
    padding: 16px 17px 14px; margin-bottom: 15px; box-shadow: var(--shadow);
    animation: rise .5s cubic-bezier(.2,.7,.3,1) both; transition: transform .18s ease, box-shadow .18s ease;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 16px 30px -14px rgba(33,84,48,.45); }
  @keyframes rise { from{opacity:0; transform:translateY(12px)} to{opacity:1; transform:translateY(0)} }
  .card:nth-child(1){animation-delay:.02s}.card:nth-child(2){animation-delay:.06s}.card:nth-child(3){animation-delay:.1s}
  .card:nth-child(4){animation-delay:.14s}.card:nth-child(5){animation-delay:.18s}.card:nth-child(6){animation-delay:.22s}
  .card:nth-child(7){animation-delay:.26s}.card:nth-child(8){animation-delay:.3s}
  .card.hit { background: linear-gradient(180deg,#f3fcf5,#ffffff); border-color: #b6e8c2; box-shadow: 0 12px 26px -12px rgba(43,148,64,.5), 0 0 0 1.5px #6fd98a inset; }
  .card .meta { display:flex; align-items:center; gap:7px; flex-wrap:wrap; margin-bottom: 9px; }
  .shop { font-size: .73rem; font-weight: 800; padding: 3px 11px; border-radius: 999px; border:1.5px solid transparent; }
  .card .date { color: var(--muted); font-size: .77rem; font-weight:500; }
  .card .hitflag { font-size:.74rem; font-weight:800; color:#fff; background:linear-gradient(160deg,#4ad06a,#2b9440); padding:3px 10px; border-radius:999px; box-shadow:0 3px 8px -3px rgba(43,148,64,.8); }
  .card .newflag { font-size:.68rem; font-weight:800; color:#5b4500; background:var(--sun); padding:3px 9px; border-radius:999px; letter-spacing:.04em; }
  .card .body { white-space: pre-wrap; word-break: break-word; font-size: .95rem; }
  .card .detected { margin-top: 10px; font-size: .83rem; color: var(--yoshi-d); font-weight: 700; background:#eafaef; padding:7px 11px; border-radius:11px; }
  .card .thumb { display: block; margin-top: 12px; width:100%; max-height: 300px; object-fit: cover; border-radius: 14px; border: 1px solid var(--line); }
  .card a.open {
    display: inline-flex; align-items:center; gap:5px; margin-top: 13px; font-size: .82rem; font-weight: 800;
    color: var(--yoshi-d); background:#eafaef; padding:8px 15px; border-radius: 999px; text-decoration: none; transition: all .16s ease;
  }
  .card a.open:hover { background:var(--yoshi); color:#fff; transform: translateX(2px); }

  .empty { text-align: center; padding: 54px 20px; color: var(--muted); background: var(--card); border: 2px dashed #cfe6d4; border-radius: 22px; box-shadow: var(--shadow); }
  .empty .big { font-size: 3rem; margin-bottom: 14px; animation: bob 3s ease-in-out infinite; }
  .empty p { margin: 3px 0; font-weight:500; }
  .empty button { margin-top:18px; background:linear-gradient(160deg,#4ad06a,#2b9440); color:#fff; border:0; border-radius:999px; padding:11px 20px; font-weight:800; font-family:var(--body); cursor:pointer; box-shadow:0 8px 16px -7px rgba(43,148,64,.9); }
  .empty button:hover { filter: brightness(1.06); }

  footer { text-align: center; color: var(--muted); font-size: .77rem; margin-top: 32px; font-weight:500; }
  footer a { color: var(--yoshi-d); text-decoration: none; font-weight:700; }
  .err { color: #e8590c; }
  .hidden { display: none; }
  @media (prefers-reduced-motion: reduce){ *{animation:none!important} }
</style>
</head>
<body>
  <header>
    <div class="header-inner">
      <h1><span class="egg"></span>ヨッシー ガチャ入荷ウォッチ <span class="live"></span></h1>
      <p class="sub">津田沼・習志野のガチャ専門店を自動で見張ってます</p>
    </div>
  </header>

  <main class="wrap">
    <div class="status" id="status"><span class="chip">読み込み中…</span></div>
    <div class="keywords" id="keywords"></div>

    <div class="tabs">
      <div class="tab active" id="tab-watch" onclick="show('watch')">🎯 ウォッチ<span class="badge hidden" id="watchBadge">0</span></div>
      <div class="tab" id="tab-feed" onclick="show('feed')">🛍 全店の最新</div>
    </div>

    <label id="feedFilter" class="feedfilter hidden">
      <input type="checkbox" id="restockOnly" onchange="renderFeed()"> 🟢 入荷情報だけ表示（完売・告知を除く）
    </label>

    <div id="view-watch"></div>
    <div id="view-feed" class="hidden"></div>

    <footer>
      営業時間中はだいたい10〜30分おきに自動チェック ／ データは
      <a href="https://github.com/satoryudev/yossy-gacha" target="_blank" rel="noopener">GitHub</a> で公開
    </footer>
  </main>

<script>
const bust = "?_=" + Date.now();
const SHOP_COLORS = {
  "C-pla 津田沼ビート店":        { c: "#1f8f3a", bg: "#e3f6e6" },
  "C-pla モリシア津田沼店":       { c: "#1273b8", bg: "#e2f1fb" },
  "C-pla イオンタウン東習志野店": { c: "#7c43c8", bg: "#f0e9fb" },
  "ガチャガチャの森【公式】":     { c: "#c06a12", bg: "#fbeede" },
};
const esc = (s) => (s || "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
const jst = (s) => {
  if (!s) return "—";
  try { return new Date(s).toLocaleString("ja-JP", { timeZone: "Asia/Tokyo", month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" }); }
  catch { return s; }
};
const ago = (iso) => {
  if (!iso) return "";
  const sec = (Date.now() - new Date(iso).getTime()) / 1000;
  if (sec < 90) return "たった今";
  if (sec < 3600) return Math.floor(sec / 60) + "分前";
  if (sec < 86400) return Math.floor(sec / 3600) + "時間前";
  return Math.floor(sec / 86400) + "日前";
};
async function getJson(path, fallback) {
  try { const r = await fetch(path + bust, { cache: "no-store" }); if (!r.ok) throw 0; return await r.json(); }
  catch { return fallback; }
}
function shopBadge(shop) {
  const s = SHOP_COLORS[shop] || { c: "#7b8d80", bg: "#eef3ee" };
  return `<span class="shop" style="color:${s.c};background:${s.bg};border-color:${s.c}44">${esc(shop)}</span>`;
}
let LAST_VISIT = 0;
let FEED_DATA = [];
const isRestock = (t) => /入荷|再入荷|入荷予定/.test(t) && !/完売/.test(t);
function card(it) {
  const hit = (it.textHits && it.textHits.length) || (it.vision && it.vision.yoshi);
  const isNew = LAST_VISIT > 0 && new Date(it.pubDate).getTime() > LAST_VISIT;
  const detected = it.vision && it.vision.yoshi
    ? `<div class="detected">🔎 AI画像判定: ヨッシーの可能性 (${Math.round((it.vision.score || 0) * 100)}%)</div>` : "";
  const img = it.images && it.images[0]
    ? `<img class="thumb" src="${it.images[0]}" loading="lazy" alt="商品画像">` : "";
  return `<article class="card${hit ? " hit" : ""}">
    <div class="meta">${shopBadge(it.shop)}<span class="date">🕒 ${jst(it.pubDate)}</span>${isNew ? '<span class="newflag">NEW</span>' : ""}${hit ? '<span class="hitflag">🎯 ヨッシー</span>' : ""}</div>
    <div class="body">${esc(it.title)}</div>
    ${detected}${img}
    <a class="open" href="${it.link}" target="_blank" rel="noopener">Xで見る →</a>
  </article>`;
}
function renderFeed() {
  const only = document.getElementById("restockOnly")?.checked;
  const list = only ? FEED_DATA.filter((it) => isRestock(it.title)) : FEED_DATA;
  document.getElementById("view-feed").innerHTML = list.length
    ? list.map(card).join("")
    : `<div class="empty"><div class="big">📭</div><p>${only ? "いまは入荷情報の投稿はありません。" : "フィードを取得できませんでした。"}</p></div>`;
}
function show(which) {
  document.getElementById("view-watch").classList.toggle("hidden", which !== "watch");
  document.getElementById("view-feed").classList.toggle("hidden", which !== "feed");
  document.getElementById("feedFilter").classList.toggle("hidden", which !== "feed");
  document.getElementById("tab-watch").classList.toggle("active", which === "watch");
  document.getElementById("tab-feed").classList.toggle("active", which === "feed");
}

(async () => {
  const [status, feed, matches] = await Promise.all([
    getJson("./data/status.json", null),
    getJson("./data/feed.json", []),
    getJson("./data/matches.json", []),
  ]);

  const statusEl = document.getElementById("status");
  if (status) {
    statusEl.innerHTML =
      `<span class="chip alive">状況 <b>${matches.length ? "入荷ヒットあり🎉" : "監視中"}</b></span>` +
      `<span class="chip">最終チェック <b>${ago(status.lastChecked)}</b></span>` +
      `<span class="chip">監視 <b>${(status.shops || []).length}</b>店</span>` +
      `<span class="chip">取得 <b>${status.fetched ?? "—"}</b>件</span>` +
      `<span class="chip">AI画像判定 <b>${(status.visionMethod || "OFF").replace(/[（(].*$/, "")}</b></span>`;
    document.getElementById("keywords").innerHTML =
      "ウォッチ語：" + (status.keywords || []).map((k) => `<span class="kw">${esc(k)}</span>`).join("");
  } else {
    statusEl.innerHTML = `<span class="chip err">状況データを読み込めませんでした</span>`;
  }

  LAST_VISIT = Number(localStorage.getItem("yg_lastVisit") || 0);
  FEED_DATA = feed;

  const wb = document.getElementById("watchBadge");
  if (matches.length) { wb.textContent = matches.length; wb.classList.remove("hidden"); }

  document.getElementById("view-watch").innerHTML = matches.length
    ? matches.map(card).join("")
    : `<div class="empty"><div class="big">🥚</div>
        <p>まだヨッシーの入荷は見つかってません。</p>
        <p>見つけたらここに表示＆通知します。気長に待ちましょう🦖</p>
        <button onclick="show('feed')">🛍 全店の最新を見る</button></div>`;

  renderFeed();

  // 今回見た最新ポスト時刻を記録 → 次回はこれより新しい投稿だけ NEW 表示
  const newest = feed.reduce((m, it) => Math.max(m, new Date(it.pubDate).getTime() || 0), 0);
  if (newest) localStorage.setItem("yg_lastVisit", String(newest));
})();
</script>
</body>
</html>
